<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AdEarn — Админка</title>
<style>
  :root{ --bg:#0B0E14; --surface:#141925; --stroke:#242C3D; --gold:#E8B448; --text:#F2F4F8; --muted:#8A93A6; --teal:#45D9C0; --danger:#E8615A; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,sans-serif;padding:16px;}
  h1{font-size:18px;margin:0 0 16px;}
  .login-box{max-width:340px;margin:80px auto;text-align:center;}
  input{width:100%;background:var(--surface);border:1px solid var(--stroke);border-radius:10px;padding:12px;color:var(--text);font-size:15px;margin-bottom:10px;}
  button{background:var(--gold);color:#171100;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer;}
  button.secondary{background:var(--surface);color:var(--text);border:1px solid var(--stroke);}
  button.danger{background:var(--danger);color:#fff;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:9px 8px;border-bottom:1px solid var(--stroke);text-align:left;vertical-align:top;}
  th{color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--bg);}
  tr:hover{background:var(--surface);}
  .status{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;display:inline-block;}
  .status.pending{background:rgba(232,180,72,.15);color:var(--gold);}
  .status.approved{background:rgba(69,217,192,.15);color:var(--teal);}
  .status.rejected{background:rgba(232,97,90,.15);color:var(--danger);}
  .actions{display:flex;gap:6px;}
  .actions button{padding:6px 10px;font-size:12px;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .muted{color:var(--muted);font-size:12px;}
  .table-wrap{overflow-x:auto;border:1px solid var(--stroke);border-radius:12px;}
  .details-cell{max-width:160px;word-break:break-all;}
</style>
</head>
<body>

<div id="login" class="login-box">
  <h1>🔒 Вход в админку</h1>
  <p class="muted" style="margin-bottom:14px;">Введи ключ ADMIN_KEY, который задан в переменных окружения сервера.</p>
  <input type="password" id="keyInput" placeholder="Секретный ключ">
  <button onclick="login()">Войти</button>
  <p id="loginError" style="color:var(--danger);font-size:13px;"></p>
</div>

<div id="panel" style="display:none;">
  <div class="top-bar">
    <h1>Заявки на вывод</h1>
    <div>
      <span class="muted" id="countLabel"></span>
      <button class="secondary" onclick="load()">↻ Обновить</button>
      <button class="secondary" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Дата</th>
          <th>Пользователь</th>
          <th>Сумма</th>
          <th>Способ</th>
          <th>Реквизиты</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const KEY_STORAGE = "adearn_admin_key";

function login(){
  const key = document.getElementById("keyInput").value.trim();
  if (!key) return;
  localStorage.setItem(KEY_STORAGE, key);
  boot();
}

function logout(){
  localStorage.removeItem(KEY_STORAGE);
  document.getElementById("panel").style.display = "none";
  document.getElementById("login").style.display = "block";
}

async function api(path, options = {}){
  const key = localStorage.getItem(KEY_STORAGE);
  const url = path + (path.includes("?") ? "&" : "?") + "key=" + encodeURIComponent(key);
  const res = await fetch(url, {
    headers: { "Content-Type": "application/json" },
    ...options,
  });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || "request_failed");
  return data;
}

function fmt(n){ return Number(n||0).toLocaleString("ru-RU", {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(ts){ return new Date(ts).toLocaleString("ru-RU"); }

const statusRu = { pending: "в обработке", approved: "выплачено", rejected: "отклонено" };

async function load(){
  try{
    const { withdrawals } = await api("/api/admin/withdrawals");
    document.getElementById("countLabel").textContent = withdrawals.length + " заявок";
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";
    withdrawals.forEach(w=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${fmtDate(w.created_at)}</td>
        <td>${w.first_name || "—"} ${w.username ? "(@"+w.username+")" : ""}<br><span class="muted">id: ${w.user_id}</span></td>
        <td><b>${fmt(w.amount)} ₽</b></td>
        <td>${w.method}</td>
        <td class="details-cell">${w.details || "—"}</td>
        <td><span class="status ${w.status}">${statusRu[w.status] || w.status}</span></td>
        <td class="actions">
          ${w.status === "pending" ? `
            <button onclick="setStatus(${w.id},'approved')">✔ Выплачено</button>
            <button class="danger" onclick="setStatus(${w.id},'rejected')">✕ Отклонить</button>
          ` : `<button class="secondary" onclick="setStatus(${w.id},'pending')">↺ Вернуть в обработку</button>`}
        </td>`;
      tbody.appendChild(tr);
    });
  }catch(e){
    if (e.message === "invalid_admin_key"){
      alert("Неверный ключ");
      logout();
    } else {
      alert("Ошибка: " + e.message);
    }
  }
}

async function setStatus(id, status){
  try{
    await api(`/api/admin/withdrawals/${id}/status`, {
      method: "POST",
      body: JSON.stringify({ status }),
    });
    load();
  }catch(e){
    alert("Ошибка: " + e.message);
  }
}

function boot(){
  const key = localStorage.getItem(KEY_STORAGE);
  if (!key){
    document.getElementById("login").style.display = "block";
    document.getElementById("panel").style.display = "none";
    return;
  }
  document.getElementById("login").style.display = "none";
  document.getElementById("panel").style.display = "block";
  load();
}

boot();
</script>
</body>
</html>
